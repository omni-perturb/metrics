[workspace]
name = "metrics"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.14.4,<3.15"
anndata = ">=0.12.14,<0.13"
pandas = ">=2.3.3,<3"
numpy = ">=2.4.4,<3"
scipy = ">=1.17.1,<2"
pyarrow = ">=24.0.0,<25"
muon = ">=0.1.6,<0.2"

[tasks]
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) metrics.yaml && printf '# auto-generated by pixi — do not edit by hand\\n' | cat - metrics.yaml > metrics.yaml.tmp && mv metrics.yaml.tmp metrics.yaml"
